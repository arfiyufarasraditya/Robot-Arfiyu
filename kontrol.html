<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ARFIYU GAMEPAD</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;

    overflow-x:hidden;
    overflow-y:auto;

    background:#000;

    color:white;
}

/* =========================
TOP BAR
========================= */

.topbar{

    position:fixed;

    top:10px;
    left:50%;

    transform:translateX(-50%);

    width:95%;

    display:flex;

    justify-content:center;

    gap:10px;

    z-index:100;
}

.top-btn{

    width:85px;
    height:50px;

    border:none;

    border-radius:15px;

    background:#052e2b;

    color:white;

    font-size:16px;

    font-weight:bold;

    box-shadow:
    0 0 25px rgba(0,255,180,.25);
}

.top-btn:active{

    background:#064e3b;
}

/* =========================
SLIDER AREA
========================= */

.slider-box{

    width:95%;

    margin:auto;

    margin-top:80px;

    padding-bottom:240px;

    display:flex;
    flex-direction:column;

    gap:15px;
}

.slider-card{

    background:#050d26;

    padding:15px;

    border-radius:20px;

    box-shadow:
    0 0 25px rgba(0,0,0,.5);
}

.slider-title{

    font-size:16px;

    margin-bottom:10px;
}

.slider{

    width:100%;
}

.value{

    margin-top:8px;

    color:#38bdf8;

    font-size:18px;
}

/* =========================
GAMEPAD
========================= */

.gamepad{

    position:fixed;

    width:150px;
    height:150px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    #000 45%,
    #00ffb3 100%);

    box-shadow:
    0 0 50px rgba(0,255,180,.45);

    z-index:50;
}

/* LEFT */

.left-pad{

    left:10px;
    bottom:10px;
}

/* RIGHT */

.right-pad{

    right:10px;
    bottom:10px;
}

/* =========================
GARIS
========================= */

.diagonal{

    position:absolute;

    width:3px;
    height:100%;

    background:rgba(255,255,255,.25);

    left:50%;

    transform:
    translateX(-50%)
    rotate(45deg);
}

/* =========================
BUTTON
========================= */

.move-btn{

    position:absolute;

    width:55px;
    height:55px;

    border:none;

    border-radius:50%;

    background:#000;

    color:white;

    font-size:24px;

    cursor:pointer;

    box-shadow:
    0 0 30px rgba(0,255,180,.25);

    transition:0.1s;
}

.move-btn:active{

    background:#111;

    box-shadow:
    0 0 50px rgba(0,255,180,.7);
}

/* =========================
POSISI TOMBOL
========================= */

.up{

    top:8px;
    left:50%;

    transform:translateX(-50%);
}

.down{

    bottom:8px;
    left:50%;

    transform:translateX(-50%);
}

.left{

    left:8px;
    top:50%;

    transform:translateY(-50%);
}

.right{

    right:8px;
    top:50%;

    transform:translateY(-50%);
}

/* =========================
DESKTOP
========================= */

@media (min-width:769px){

  .slider-box{

      width:420px;
  }

  .gamepad{

      width:300px;
      height:300px;
  }

  .move-btn{

      width:110px;
      height:110px;

      font-size:45px;
  }

  .left-pad{

      left:40px;
      bottom:40px;
  }

  .right-pad{

      right:40px;
      bottom:40px;
  }

  .up{

      top:18px;
  }

  .down{

      bottom:18px;
  }

  .left{

      left:18px;
  }

  .right{

      right:18px;
  }
}

</style>
</head>

<body>

<!-- =========================
TOP BAR
========================= -->

<div class="topbar">

    <button class="top-btn"
    onclick="connectBLE()">

    BLE

    </button>

    <button class="top-btn"
    onpointerdown="sendData('P')">

    PID

    </button>

    <button class="top-btn"
    onpointerdown="sendData('M')">

    MAN

    </button>

</div>

<!-- =========================
LEFT GAMEPAD
========================= -->

<div class="gamepad left-pad">

    <div class="diagonal"></div>

    <button class="move-btn up"

    onpointerdown="startSend('W')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    </button>

    <button class="move-btn down"

    onpointerdown="startSend('S')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    </button>

</div>

<!-- =========================
RIGHT GAMEPAD
========================= -->

<div class="gamepad right-pad">

    <div class="diagonal"></div>

    <button class="move-btn left"

    onpointerdown="startSend('A')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    </button>

    <button class="move-btn right"

    onpointerdown="startSend('D')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    </button>

</div>

<!-- =========================
SLIDER
========================= -->

<div class="slider-box">

    <!-- SERVO 1 -->

    <div class="slider-card">

        <div class="slider-title">
        Servo Capit
        </div>

        <input
        type="range"
        min="0"
        max="180"
        value="150"
        class="slider"
        id="slider1">

        <div class="value"
        id="value1">

        150°

        </div>

    </div>

    <!-- SERVO 2 -->

    <div class="slider-card">

        <div class="slider-title">
        Servo Engsel
        </div>

        <input
        type="range"
        min="0"
        max="180"
        value="90"
        class="slider"
        id="slider2">

        <div class="value"
        id="value2">

        90°

        </div>

    </div>

    <!-- PWM -->

    <div class="slider-card">

        <div class="slider-title">
        PWM Manual Motor
        </div>

        <input
        type="range"
        min="0"
        max="255"
        value="210"
        class="slider"
        id="sliderPWM">

        <div class="value"
        id="valuePWM">

        210

        </div>

    </div>

    <!-- PID BASE -->

    <div class="slider-card">

        <div class="slider-title">
        PID Kecepatan Dasar
        </div>

        <input
        type="range"
        min="0"
        max="255"
        value="200"
        class="slider"
        id="sliderBase">

        <div class="value"
        id="valueBase">

        200

        </div>

    </div>

    <!-- PID MAX -->

    <div class="slider-card">

        <div class="slider-title">
        PID Kecepatan Maksimum
        </div>

        <input
        type="range"
        min="0"
        max="255"
        value="220"
        class="slider"
        id="sliderMax">

        <div class="value"
        id="valueMax">

        220

        </div>

    </div>

</div>

<script>

let characteristic;

const serviceUUID =
"12345678-1234-1234-1234-1234567890ab";

const characteristicUUID =
"abcdefab-1234-5678-1234-abcdefabcdef";

/* =========================
BLE CONNECT
========================= */

async function connectBLE(){

    try{

        const device =
        await navigator.bluetooth.requestDevice({

            acceptAllDevices:true,
            optionalServices:[serviceUUID]

        });

        const server =
        await device.gatt.connect();

        const service =
        await server.getPrimaryService(
            serviceUUID
        );

        characteristic =
        await service.getCharacteristic(
            characteristicUUID
        );

        alert("BLE Connected");

    }

    catch(err){

        alert(err);
    }
}

/* =========================
SEND DATA
========================= */

async function sendData(data){

    if(!characteristic) return;

    try{

        await characteristic
        .writeValueWithoutResponse(

            new TextEncoder().encode(data)

        );

    }

    catch(err){

        console.log(err);
    }
}

/* =========================
HOLD BUTTON
========================= */

let controlInterval = null;

function startSend(cmd){

    stopSend();

    sendData(cmd);

    controlInterval =
    setInterval(()=>{

        sendData(cmd);

    },30);
}

function stopSend(){

    if(controlInterval){

        clearInterval(controlInterval);

        controlInterval = null;
    }

    sendData("X");
}

/* =========================
SERVO
========================= */

slider1.oninput = ()=>{

    value1.innerHTML =
    slider1.value + "°";

    sendData(
        "V" + slider1.value
    );
};

slider2.oninput = ()=>{

    value2.innerHTML =
    slider2.value + "°";

    sendData(
        "U" + slider2.value
    );
};

/* =========================
PWM MANUAL
========================= */

sliderPWM.oninput = ()=>{

    valuePWM.innerHTML =
    sliderPWM.value;

    sendData(
        "K" + sliderPWM.value
    );
};

/* =========================
PID BASE
========================= */

sliderBase.oninput = ()=>{

    valueBase.innerHTML =
    sliderBase.value;

    sendData(
        "B" + sliderBase.value
    );
};

/* =========================
PID MAX
========================= */

sliderMax.oninput = ()=>{

    valueMax.innerHTML =
    sliderMax.value;

    sendData(
        "L" + sliderMax.value
    );
};

</script>

</body>
</html>
