```html
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Robot BLE Control</title>

<style>

body{

  background:#111;
  color:white;

  font-family:Arial;

  text-align:center;

  margin-top:20px;
}

button{

  width:130px;
  height:65px;

  font-size:20px;

  margin:12px;

  border:none;

  border-radius:12px;

  background:#333;

  color:white;
}

button:active{

  background:#777;
}

.slider{

  width:300px;
}

h1{

  margin-bottom:30px;
}

</style>

</head>

<body>

<h1>ROBOT CONTROL</h1>

<!-- ========================= -->
<!-- CONNECT -->
<!-- ========================= -->

<button onclick="connectBLE()">

CONNECT BLE

</button>

<br><br><br>

<!-- ========================= -->
<!-- MODE -->
<!-- ========================= -->

<button onclick="sendData('P')">

AUTO PID

</button>

<button onclick="sendData('M')">

MODE MANUAL

</button>

<br><br><br>

<!-- ========================= -->
<!-- MAJU -->
<!-- ========================= -->

<button

ontouchstart="sendData('W')"
ontouchend="sendData('X')"

>

MAJU

</button>

<br><br>

<!-- ========================= -->
<!-- KIRI -->
<!-- ========================= -->

<button

ontouchstart="sendData('A')"
ontouchend="sendData('X')"

>

KIRI

</button>

<!-- ========================= -->
<!-- KANAN -->
<!-- ========================= -->

<button

ontouchstart="sendData('D')"
ontouchend="sendData('X')"

>

KANAN

</button>

<br><br>

<!-- ========================= -->
<!-- MUNDUR -->
<!-- ========================= -->

<button

ontouchstart="sendData('S')"
ontouchend="sendData('X')"

>

MUNDUR

</button>

<br><br><br><br>

<!-- ========================= -->
<!-- SERVO 1 -->
<!-- ========================= -->

<h2>Servo Capit</h2>

<input

type="range"

min="0"
max="180"

value="90"

class="slider"

id="slider1"

>

<p id="value1">90</p>

<br><br>

<!-- ========================= -->
<!-- SERVO 2 -->
<!-- ========================= -->

<h2>Servo Engsel</h2>

<input

type="range"

min="0"
max="180"

value="90"

class="slider"

id="slider2"

>

<p id="value2">90</p>

<script>

// =========================
// BLE
// =========================

let characteristic;

// UUID HARUS SAMA DENGAN ESP32

const serviceUUID =
"12345678-1234-1234-1234-1234567890ab";

const characteristicUUID =
"abcdefab-1234-5678-1234-abcdefabcdef";

// =========================
// CONNECT BLE
// =========================

async function connectBLE(){

  try{

    const device =
    await navigator.bluetooth.requestDevice({

      acceptAllDevices:true,

      optionalServices:[serviceUUID]

    });

    const server =
    await device.gatt.connect();

    const service =
    await server.getPrimaryService(serviceUUID);

    characteristic =
    await service.getCharacteristic(
      characteristicUUID
    );

    alert("BLE CONNECTED");

  }

  catch(error){

    console.log(error);

    alert(error);
  }
}

// =========================
// SEND DATA
// =========================

async function sendData(data){

  if(!characteristic){

    alert("BLE belum connect");

    return;
  }

  const encoder =
  new TextEncoder();

  await characteristic.writeValue(

    encoder.encode(data)

  );

  console.log("SEND:", data);
}

// =========================
// SERVO 1
// =========================

const slider1 =
document.getElementById("slider1");

slider1.addEventListener(

  "input",

  function(){

    document.getElementById("value1")
    .innerHTML = slider1.value;

    sendData("V" + slider1.value);

  }

);

// =========================
// SERVO 2
// =========================

const slider2 =
document.getElementById("slider2");

slider2.addEventListener(

  "input",

  function(){

    document.getElementById("value2")
    .innerHTML = slider2.value;

    sendData("U" + slider2.value);

  }

);

</script>

</body>
</html>
