```html
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>ARFIYU GAMEPAD</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;

    -webkit-tap-highlight-color:transparent;
}

body{

    background:#000;
    color:white;

    overflow-x:hidden;

    min-height:100vh;

    padding-top:55px;
    padding-bottom:150px;
}

/* =========================
TOP BAR
========================= */

.topbar{

    position:fixed;

    top:5px;
    left:50%;

    transform:translateX(-50%);

    width:100%;

    display:flex;

    justify-content:center;

    gap:6px;

    z-index:100;
}

.top-btn{

    width:65px;
    height:38px;

    border:none;

    border-radius:10px;

    background:#052e2b;

    color:white;

    font-size:13px;

    font-weight:bold;
}

/* =========================
SLIDER AREA
========================= */

.slider-box{

    width:92%;

    margin:auto;

    display:flex;
    flex-direction:column;

    gap:8px;
}

.slider-card{

    background:#050d26;

    padding:10px;

    border-radius:14px;
}

.slider-title{

    font-size:13px;

    margin-bottom:6px;
}

.slider{

    width:100%;

    height:18px;
}

.value{

    margin-top:5px;

    color:#38bdf8;

    font-size:14px;
}

/* =========================
GAMEPAD
========================= */

.gamepad{

    position:fixed;

    width:115px;
    height:115px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    #000 45%,
    #00ffb3 100%);

    z-index:50;
}

/* LEFT */

.left-pad{

    left:8px;
    bottom:8px;
}

/* RIGHT */

.right-pad{

    right:8px;
    bottom:8px;
}

/* =========================
GARIS
========================= */

.diagonal{

    position:absolute;

    width:2px;
    height:100%;

    background:rgba(255,255,255,.2);

    left:50%;

    transform:
    translateX(-50%)
    rotate(45deg);
}

/* =========================
BUTTON
========================= */

.move-btn{

    position:absolute;

    width:42px;
    height:42px;

    border:none;

    border-radius:50%;

    background:#000;

    color:white;

    font-size:18px;
}

/* =========================
POSISI
========================= */

.up{

    top:6px;
    left:50%;

    transform:translateX(-50%);
}

.down{

    bottom:6px;
    left:50%;

    transform:translateX(-50%);
}

.left{

    left:6px;
    top:50%;

    transform:translateY(-50%);
}

.right{

    right:6px;
    top:50%;

    transform:translateY(-50%);
}

/* =========================
DESKTOP
========================= */

@media (min-width:769px){

    body{

        padding-top:80px;
    }

    .top-btn{

        width:90px;
        height:55px;

        font-size:18px;
    }

    .slider-box{

        width:420px;

        gap:15px;
    }

    .slider-card{

        padding:18px;

        border-radius:20px;
    }

    .slider-title{

        font-size:18px;
    }

    .value{

        font-size:18px;
    }

    .gamepad{

        width:250px;
        height:250px;
    }

    .move-btn{

        width:90px;
        height:90px;

        font-size:35px;
    }

    .left-pad{

        left:30px;
        bottom:30px;
    }

    .right-pad{

        right:30px;
        bottom:30px;
    }

    .up{

        top:14px;
    }

    .down{

        bottom:14px;
    }

    .left{

        left:14px;
    }

    .right{

        right:14px;
    }
}

</style>
</head>

<body>

<!-- =========================
TOP BAR
========================= -->

<div class="topbar">

    <button class="top-btn"
    onclick="connectBLE()">

    BLE

    </button>

    <button class="top-btn"
    onclick="sendData('P')">

    PID

    </button>

    <button class="top-btn"
    onclick="sendData('M')">

    MAN

    </button>

</div>

<!-- =========================
LEFT GAMEPAD
========================= -->

<div class="gamepad left-pad">

    <div class="diagonal"></div>

    <button class="move-btn up"

    onpointerdown="startSend('W')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    </button>

    <button class="move-btn down"

    onpointerdown="startSend('S')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    </button>

</div>

<!-- =========================
RIGHT GAMEPAD
========================= -->

<div class="gamepad right-pad">

    <div class="diagonal"></div>

    <button class="move-btn left"

    onpointerdown="startSend('A')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    </button>

    <button class="move-btn right"

    onpointerdown="startSend('D')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    </button>

</div>

<!-- =========================
SLIDER
========================= -->

<div class="slider-box">

    <!-- SERVO 1 -->

    <div class="slider-card">

        <div class="slider-title">
        Servo Capit
        </div>

        <input
        type="range"
        min="0"
        max="180"
        value="150"
        class="slider"
        id="slider1">

        <div class="value"
        id="value1">

        150°

        </div>

    </div>

    <!-- SERVO 2 -->

    <div class="slider-card">

        <div class="slider-title">
        Servo Engsel
        </div>

        <input
        type="range"
        min="0"
        max="180"
        value="90"
        class="slider"
        id="slider2">

        <div class="value"
        id="value2">

        90°

        </div>

    </div>

    <!-- PWM -->

    <div class="slider-card">

        <div class="slider-title">
        PWM Manual Motor
        </div>

        <input
        type="range"
        min="0"
        max="255"
        value="210"
        class="slider"
        id="sliderPWM">

        <div class="value"
        id="valuePWM">

        210

        </div>

    </div>

    <!-- PID BASE -->

    <div class="slider-card">

        <div class="slider-title">
        PID Kecepatan Dasar
        </div>

        <input
        type="range"
        min="0"
        max="255"
        value="200"
        class="slider"
        id="sliderBase">

        <div class="value"
        id="valueBase">

        200

        </div>

    </div>

    <!-- PID MAX -->

    <div class="slider-card">

        <div class="slider-title">
        PID Kecepatan Maksimum
        </div>

        <input
        type="range"
        min="0"
        max="255"
        value="220"
        class="slider"
        id="sliderMax">

        <div class="value"
        id="valueMax">

        220

        </div>

    </div>

</div>

<script>

let characteristic;

const serviceUUID =
"12345678-1234-1234-1234-1234567890ab";

const characteristicUUID =
"abcdefab-1234-5678-1234-abcdefabcdef";

/* =========================
BLE CONNECT
========================= */

async function connectBLE(){

    try{

        const device =
        await navigator.bluetooth.requestDevice({

            acceptAllDevices:true,
            optionalServices:[serviceUUID]

        });

        const server =
        await device.gatt.connect();

        const service =
        await server.getPrimaryService(
            serviceUUID
        );

        characteristic =
        await service.getCharacteristic(
            characteristicUUID
        );

        alert("BLE Connected");

    }

    catch(err){

        alert(err);
    }
}

/* =========================
SEND DATA
========================= */

async function sendData(data){

    if(!characteristic) return;

    try{

        await characteristic
        .writeValueWithoutResponse(

            new TextEncoder().encode(data)

        );

    }

    catch(err){

        console.log(err);
    }
}

/* =========================
HOLD BUTTON
========================= */

let controlInterval = null;

function startSend(cmd){

    stopSend();

    sendData(cmd);

    controlInterval =
    setInterval(()=>{

        sendData(cmd);

    },30);
}

function stopSend(){

    if(controlInterval){

        clearInterval(controlInterval);

        controlInterval = null;
    }

    sendData("X");
}

/* =========================
SERVO
========================= */

slider1.oninput = ()=>{

    value1.innerHTML =
    slider1.value + "°";

    sendData(
        "V" + slider1.value
    );
};

slider2.oninput = ()=>{

    value2.innerHTML =
    slider2.value + "°";

    sendData(
        "U" + slider2.value
    );
};

/* =========================
PWM MANUAL
========================= */

sliderPWM.oninput = ()=>{

    valuePWM.innerHTML =
    sliderPWM.value;

    sendData(
        "K" + sliderPWM.value
    );
};

/* =========================
PID BASE
========================= */

sliderBase.oninput = ()=>{

    valueBase.innerHTML =
    sliderBase.value;

    sendData(
        "B" + sliderBase.value
    );
};

/* =========================
PID MAX
========================= */

sliderMax.oninput = ()=>{

    valueMax.innerHTML =
    sliderMax.value;

    sendData(
        "L" + sliderMax.value
    );
};

</script>

</body>
</html>
```
