<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Robot BLE</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h1>Robot Control</h1>

<button onclick="connectBLE()">
CONNECT BLE
</button>

<br><br>

<button onclick="sendData('W')">MAJU</button>

<br><br>

<button onclick="sendData('A')">KIRI</button>

<button onclick="sendData('S')">MUNDUR</button>

<button onclick="sendData('D')">KANAN</button>

<br><br>

<input type="range" min="0" max="180" value="90" id="slider">

<p id="value">90</p>

<script>

let characteristic;

// UUID HARUS SAMA DENGAN ESP32
const serviceUUID = "12345678-1234-1234-1234-1234567890ab";

const characteristicUUID =
"abcdefab-1234-5678-1234-abcdefabcdef";

// =========================
// CONNECT BLE
// =========================

async function connectBLE(){

  try{

    const device =
      await navigator.bluetooth.requestDevice({

      acceptAllDevices: true,

      optionalServices: [serviceUUID]

    });

    const server = await device.gatt.connect();

    const service =
      await server.getPrimaryService(serviceUUID);

    characteristic =
      await service.getCharacteristic(characteristicUUID);

    alert("BLE Connected");

  }catch(error){

    console.log(error);

    alert(error);

  }
}

// =========================
// SEND DATA
// =========================

async function sendData(data){

  if(!characteristic){
    alert("Belum connect BLE");
    return;
  }

  const encoder = new TextEncoder();

  await characteristic.writeValue(
    encoder.encode(data)
  );

  console.log(data);
}

// =========================
// SLIDER SERVO
// =========================

const slider =
document.getElementById("slider");

slider.addEventListener("input", function(){

  document.getElementById("value").innerHTML =
  slider.value;

  sendData("V" + slider.value);

});

</script>

</body>
</html>
