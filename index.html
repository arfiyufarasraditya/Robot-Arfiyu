<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>ARFIYU GAMEPAD</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;

    -webkit-user-select:none;
    user-select:none;
}

body{

    background:#000;
    color:white;

    width:100vw;
    height:100vh;

    overflow:hidden;
}

/* =========================
ROTATE MESSAGE
========================= */

#rotateMessage{

    position:fixed;

    inset:0;

    background:black;

    display:none;

    justify-content:center;
    align-items:center;

    z-index:9999;
}

.rotate-box{

    color:white;

    font-size:28px;

    text-align:center;

    padding:30px;
}

/* =========================
TOP BAR
========================= */

.topbar{

    position:fixed;

    top:8px;
    left:50%;

    transform:translateX(-50%);

    display:flex;

    gap:8px;

    z-index:100;
}

.top-btn{

    width:60px;
    height:34px;

    border:none;

    border-radius:10px;

    background:#052e2b;

    color:white;

    font-size:12px;

    font-weight:bold;
}

/* =========================
SLIDER AREA
========================= */

.slider-box{

    position:absolute;

    top:50px;
    left:50%;

    transform:translateX(-50%);

    width:55%;

    display:flex;
    flex-direction:column;

    gap:8px;

    padding-bottom:120px;
}

.slider-card{

    background:#06111f;

    padding:8px;

    border-radius:12px;
}

.slider-title{

    font-size:12px;

    margin-bottom:5px;
}

.slider{

    width:100%;
}

.value{

    font-size:12px;

    margin-top:4px;

    color:#38bdf8;
}

/* =========================
GAMEPAD
========================= */

.gamepad{

    position:fixed;

    width:95px;
    height:95px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    #000 45%,
    #00ffb3 100%);

    box-shadow:
    0 0 25px rgba(0,255,180,.4);

    z-index:50;
}

/* LEFT */

.left-pad{

    left:10px;
    bottom:10px;
}

/* RIGHT */

.right-pad{

    right:10px;
    bottom:10px;
}

/* =========================
DIAGONAL
========================= */

.diagonal{

    position:absolute;

    width:2px;
    height:100%;

    background:rgba(255,255,255,.25);

    left:50%;

    transform:
    translateX(-50%)
    rotate(45deg);
}

/* =========================
BUTTON
========================= */

.move-btn{

    position:absolute;

    width:36px;
    height:36px;

    border:none;

    border-radius:50%;

    background:#000;

    color:white;

    font-size:15px;

    box-shadow:
    0 0 10px rgba(0,255,180,.4);
}

.move-btn:active{

    background:#111;
}

/* =========================
POSISI
========================= */

.up{

    top:6px;
    left:50%;

    transform:translateX(-50%);
}

.down{

    bottom:6px;
    left:50%;

    transform:translateX(-50%);
}

.left{

    left:6px;
    top:50%;

    transform:translateY(-50%);
}

.right{

    right:6px;
    top:50%;

    transform:translateY(-50%);
}

/* =========================
PORTRAIT
========================= */

@media screen and (orientation: portrait){

    #rotateMessage{

        display:flex;
    }

    .topbar,
    .slider-box,
    .gamepad{

        display:none;
    }
}

</style>
</head>

<body>

<!-- =========================
ROTATE
========================= -->

<div id="rotateMessage">

    <div class="rotate-box">

        ROTATE HP KE LANDSCAPE

    </div>

</div>

<!-- =========================
TOP BAR
========================= -->

<div class="topbar">

    <button class="top-btn"
    onclick="connectBLE()">

    BLE

    </button>

    <button class="top-btn"
    onclick="sendData('P')">

    PID

    </button>

    <button class="top-btn"
    onclick="sendData('M')">

    MAN

    </button>

</div>

<!-- =========================
LEFT GAMEPAD
========================= -->

<div class="gamepad left-pad">

    <div class="diagonal"></div>

    <button class="move-btn up"

    onpointerdown="startSend('W')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    ▲

    </button>

    <button class="move-btn down"

    onpointerdown="startSend('S')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    ▼

    </button>

</div>

<!-- =========================
RIGHT GAMEPAD
========================= -->

<div class="gamepad right-pad">

    <div class="diagonal"></div>

    <button class="move-btn left"

    onpointerdown="startSend('A')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    ◀

    </button>

    <button class="move-btn right"

    onpointerdown="startSend('D')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    ▶

    </button>

</div>

<!-- =========================
SLIDER
========================= -->

<div class="slider-box">

    <!-- SERVO 1 -->

    <div class="slider-card">

        <div class="slider-title">
        Servo Capit
        </div>

        <input type="range"
        min="0"
        max="180"
        value="150"
        class="slider"
        id="slider1">

        <div class="value"
        id="value1">

        150°

        </div>

    </div>

    <!-- SERVO 2 -->

    <div class="slider-card">

        <div class="slider-title">
        Servo Engsel
        </div>

        <input type="range"
        min="0"
        max="180"
        value="90"
        class="slider"
        id="slider2">

        <div class="value"
        id="value2">

        90°

        </div>

    </div>

    <!-- PWM -->

    <div class="slider-card">

        <div class="slider-title">
        PWM Manual
        </div>

        <input type="range"
        min="0"
        max="255"
        value="210"
        class="slider"
        id="sliderPWM">

        <div class="value"
        id="valuePWM">

        210

        </div>

    </div>

    <!-- PID BASE -->

    <div class="slider-card">

        <div class="slider-title">
        PID Dasar
        </div>

        <input type="range"
        min="0"
        max="255"
        value="200"
        class="slider"
        id="sliderBase">

        <div class="value"
        id="valueBase">

        200

        </div>

    </div>

    <!-- PID MAX -->

    <div class="slider-card">

        <div class="slider-title">
        PID Max
        </div>

        <input type="range"
        min="0"
        max="255"
        value="220"
        class="slider"
        id="sliderMax">

        <div class="value"
        id="valueMax">

        220

        </div>

    </div>

</div>

<script>

let characteristic;

const serviceUUID =
"12345678-1234-1234-1234-1234567890ab";

const characteristicUUID =
"abcdefab-1234-5678-1234-abcdefabcdef";

/* =========================
BLE CONNECT
========================= */

async function connectBLE(){

    try{

        const device =
        await navigator.bluetooth.requestDevice({

            acceptAllDevices:true,
            optionalServices:[serviceUUID]

        });

        const server =
        await device.gatt.connect();

        const service =
        await server.getPrimaryService(
            serviceUUID
        );

        characteristic =
        await service.getCharacteristic(
            characteristicUUID
        );

        alert("BLE CONNECTED");
    }

    catch(err){

        alert(err);
    }
}

/* =========================
SEND DATA
========================= */

async function sendData(data){

    if(!characteristic) return;

    try{

        await characteristic
        .writeValueWithoutResponse(

            new TextEncoder().encode(data)

        );
    }

    catch(err){

        console.log(err);
    }
}

/* =========================
BUTTON HOLD
========================= */

let controlInterval = null;

function startSend(cmd){

    stopSend();

    sendData(cmd);

    controlInterval =
    setInterval(()=>{

        sendData(cmd);

    },30);
}

function stopSend(){

    if(controlInterval){

        clearInterval(controlInterval);

        controlInterval = null;
    }

    sendData("X");
}

/* =========================
SERVO
========================= */

slider1.oninput = ()=>{

    value1.innerHTML =
    slider1.value + "°";

    sendData(
        "V" + slider1.value
    );
};

slider2.oninput = ()=>{

    value2.innerHTML =
    slider2.value + "°";

    sendData(
        "U" + slider2.value
    );
};

/* =========================
PWM MANUAL
========================= */

sliderPWM.oninput = ()=>{

    valuePWM.innerHTML =
    sliderPWM.value;

    sendData(
        "K" + sliderPWM.value
    );
};

/* =========================
PID BASE
========================= */

sliderBase.oninput = ()=>{

    valueBase.innerHTML =
    sliderBase.value;

    sendData(
        "B" + sliderBase.value
    );
};

/* =========================
PID MAX
========================= */

sliderMax.oninput = ()=>{

    valueMax.innerHTML =
    sliderMax.value;

    sendData(
        "L" + sliderMax.value
    );
};

</script>

</body>
</html>
