<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ARFIYU GAMEPAD</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    width:100vw;
    height:100vh;

    overflow:hidden;

    background:#000;

    color:white;
}

/* =========================
SLIDER AREA
========================= */

.slider-box{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:420px;

    display:flex;
    flex-direction:column;

    gap:25px;

    z-index:10;
}

.slider-card{

    background:#050d26;

    padding:25px;

    border-radius:30px;

    box-shadow:
    0 0 30px rgba(0,0,0,.5);
}

.slider-title{

    font-size:22px;

    margin-bottom:15px;
}

.slider{

    width:100%;
}

.value{

    margin-top:12px;

    color:#38bdf8;

    font-size:22px;
}

/* =========================
GAMEPAD
========================= */

.gamepad{

    position:absolute;

    width:340px;
    height:340px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    #000 45%,
    #00ffb3 100%);

    box-shadow:
    0 0 70px rgba(0,255,180,.45);
}

/* LEFT */

.left-pad{

    left:40px;
    bottom:40px;
}

/* RIGHT */

.right-pad{

    right:40px;
    bottom:40px;
}

/* =========================
GARIS
========================= */

.diagonal{

    position:absolute;

    width:4px;
    height:100%;

    background:rgba(255,255,255,.25);

    left:50%;

    transform:
    translateX(-50%)
    rotate(45deg);
}

/* =========================
BUTTON
========================= */

.move-btn{

    position:absolute;

    width:120px;
    height:120px;

    border:none;

    border-radius:50%;

    background:#000;

    color:white;

    font-size:55px;

    cursor:pointer;

    box-shadow:
    0 0 40px rgba(0,255,180,.25);

    transition:0.1s;
}

/* TANPA GOYANG */

.move-btn:active{

    background:#111;

    box-shadow:
    0 0 60px rgba(0,255,180,.7);
}

/* =========================
POSISI TOMBOL
========================= */

/* LEFT PAD */

.up{

    top:20px;
    left:50%;

    transform:translateX(-50%);
}

.down{

    bottom:20px;
    left:50%;

    transform:translateX(-50%);
}

/* RIGHT PAD */

.left{

    left:20px;
    top:50%;

    transform:translateY(-50%);
}

.right{

    right:20px;
    top:50%;

    transform:translateY(-50%);
}

/* =========================
TOP BUTTON
========================= */

.topbar{

    position:absolute;

    top:20px;
    left:20px;

    display:flex;

    gap:15px;

    z-index:10;
}

.top-btn{

    width:90px;
    height:70px;

    border:none;

    border-radius:20px;

    background:#052e2b;

    color:white;

    font-size:22px;

    font-weight:bold;

    box-shadow:
    0 0 25px rgba(0,255,180,.25);
}

.top-btn:active{

    background:#064e3b;
}
@media (max-width: 768px){

    .slider-box{

        width:90%;
        top:45%;

        gap:15px;
    }

    .slider-card{

        padding:15px;
        border-radius:20px;
    }

    .slider-title{

        font-size:16px;
    }

    .value{

        font-size:18px;
    }

    .gamepad{

        width:170px;
        height:170px;
    }

    .move-btn{

        width:60px;
        height:60px;

        font-size:30px;
    }

    .left-pad{

        left:10px;
        bottom:10px;
    }

    .right-pad{

        right:10px;
        bottom:10px;
    }

    .top-btn{

        width:70px;
        height:50px;

        font-size:16px;
    }

    .up{

        top:10px;
    }

    .down{

        bottom:10px;
    }

    .left{

        left:10px;
    }

    .right{

        right:10px;
    }
}

</style>
</head>

<body>

<!-- =========================
TOP BAR
========================= -->

<div class="topbar">

    <button class="top-btn"
    onclick="connectBLE()">

    BLE

    </button>

    <button class="top-btn"
    onpointerdown="sendData('P')">

    PID

    </button>

    <button class="top-btn"
    onpointerdown="sendData('M')">

    MAN

    </button>

</div>

<!-- =========================
LEFT GAMEPAD
========================= -->

<div class="gamepad left-pad">

    <div class="diagonal"></div>

    <button class="move-btn up"

    onpointerdown="startSend('W')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    </button>

    <button class="move-btn down"

    onpointerdown="startSend('S')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    </button>

</div>

<!-- =========================
RIGHT GAMEPAD
========================= -->

<div class="gamepad right-pad">

    <div class="diagonal"></div>

    <button class="move-btn left"

    onpointerdown="startSend('A')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    </button>

    <button class="move-btn right"

    onpointerdown="startSend('D')"
    onpointerup="stopSend()"
    onpointerleave="stopSend()">

    </button>

</div>

<!-- =========================
SLIDER
========================= -->

<div class="slider-box">

    <div class="slider-card">

        <div class="slider-title">
        Servo Capit
        </div>

        <input
        type="range"
        min="0"
        max="180"
        value="150"
        class="slider"
        id="slider1">

        <div class="value"
        id="value1">

        150°

        </div>

    </div>

    <div class="slider-card">

        <div class="slider-title">
        Servo Engsel
        </div>

        <input
        type="range"
        min="0"
        max="180"
        value="90"
        class="slider"
        id="slider2">

        <div class="value"
        id="value2">

        90°

        </div>

    </div>

    <!-- =========================
PWM MANUAL
========================= -->

<div class="slider-card">

    <div class="slider-title">
    PWM Manual Motor
    </div>

    <input
    type="range"
    min="0"
    max="255"
    value="210"
    class="slider"
    id="sliderPWM">

    <div class="value"
    id="valuePWM">

    210

    </div>

</div>

<!-- =========================
PID DASAR
========================= -->

<div class="slider-card">

    <div class="slider-title">
    PID Kecepatan Dasar
    </div>

    <input
    type="range"
    min="0"
    max="255"
    value="200"
    class="slider"
    id="sliderBase">

    <div class="value"
    id="valueBase">

    200

    </div>

</div>

<!-- =========================
PID MAX
========================= -->

<div class="slider-card">

    <div class="slider-title">
    PID Kecepatan Maksimum
    </div>

    <input
    type="range"
    min="0"
    max="255"
    value="220"
    class="slider"
    id="sliderMax">

    <div class="value"
    id="valueMax">

    220

    </div>

</div>

</div>

<script>

let characteristic;

const serviceUUID =
"12345678-1234-1234-1234-1234567890ab";

const characteristicUUID =
"abcdefab-1234-5678-1234-abcdefabcdef";

/* =========================
BLE CONNECT
========================= */

async function connectBLE(){

    try{

        const device =
        await navigator.bluetooth.requestDevice({

            acceptAllDevices:true,
            optionalServices:[serviceUUID]

        });

        const server =
        await device.gatt.connect();

        const service =
        await server.getPrimaryService(
            serviceUUID
        );

        characteristic =
        await service.getCharacteristic(
            characteristicUUID
        );

        alert("BLE Connected");

    }

    catch(err){

        alert(err);
    }
}

/* =========================
SEND DATA
========================= */

async function sendData(data){

    if(!characteristic) return;

    try{

        await characteristic
        .writeValueWithoutResponse(

            new TextEncoder().encode(data)

        );

    }

    catch(err){

        console.log(err);
    }
}

/* =========================
HOLD BUTTON
========================= */

let controlInterval = null;

function startSend(cmd){

    stopSend();

    sendData(cmd);

    controlInterval =
    setInterval(()=>{

        sendData(cmd);

    },30);
}

function stopSend(){

    if(controlInterval){

        clearInterval(controlInterval);

        controlInterval = null;
    }

    sendData("X");
}

/* =========================
SERVO
========================= */

slider1.oninput = ()=>{

    value1.innerHTML =
    slider1.value + "°";

    sendData(
        "V" + slider1.value
    );
};

slider2.oninput = ()=>{

    value2.innerHTML =
    slider2.value + "°";

    sendData(
        "U" + slider2.value
    );
};

/* =========================
PWM MANUAL
========================= */

sliderPWM.oninput = ()=>{

    valuePWM.innerHTML =
    sliderPWM.value;

    sendData(
        "K" + sliderPWM.value
    );
};

/* =========================
PID BASE
========================= */

sliderBase.oninput = ()=>{

    valueBase.innerHTML =
    sliderBase.value;

    sendData(
        "B" + sliderBase.value
    );
};

/* =========================
PID MAX
========================= */

sliderMax.oninput = ()=>{

    valueMax.innerHTML =
    sliderMax.value;

    sendData(
        "L" + sliderMax.value
    );
};
</script>

</body>
</html>
